name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - label: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - label: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis
          - label: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu --bundles appimage,deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Claude MCP ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            Claude MCP desktop installers.

            Platforms:
            - macOS x64 / ARM64
            - Windows x64 / ARM64
            - Linux x64 / ARM64
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
